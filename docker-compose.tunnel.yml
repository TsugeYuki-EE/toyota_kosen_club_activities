services:
  app:
    environment:
      FORCE_HTTPS: "true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: club-activities-cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
