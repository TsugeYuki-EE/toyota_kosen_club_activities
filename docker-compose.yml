services:
  postgres:
    image: postgres:16-alpine
    container_name: club-activities-postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      start_period: 90s
      interval: 5s
      timeout: 5s
      retries: 30
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=40"]
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  init-db:
    image: postgres:16-alpine
    container_name: club-activities-init-db
    restart: "no"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGHOST: postgres
      PGPORT: "5432"
    command:
      - sh
      - -ec
      - |
        until PGPASSWORD="$$POSTGRES_PASSWORD" pg_isready --host "$$PGHOST" --port "$$PGPORT" --username "$$POSTGRES_USER" --dbname postgres >/dev/null 2>&1; do
          sleep 2
        done
        if ! PGPASSWORD="$$POSTGRES_PASSWORD" psql --host "$$PGHOST" --port "$$PGPORT" --username "$$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_database WHERE datname='handball_notes'" | grep -q 1; then
          PGPASSWORD="$$POSTGRES_PASSWORD" psql --host "$$PGHOST" --port "$$PGPORT" --username "$$POSTGRES_USER" --dbname postgres -c "CREATE DATABASE handball_notes"
        fi
        if ! PGPASSWORD="$$POSTGRES_PASSWORD" psql --host "$$PGHOST" --port "$$PGPORT" --username "$$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_database WHERE datname='table_tennis_notes'" | grep -q 1; then
          PGPASSWORD="$$POSTGRES_PASSWORD" psql --host "$$PGHOST" --port "$$PGPORT" --username "$$POSTGRES_USER" --dbname postgres -c "CREATE DATABASE table_tennis_notes"
        fi

  db-backup:
    image: postgres:16-alpine
    container_name: club-activities-db-backup
    restart: "no"
    init: true
    profiles: ["backup"]
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGHOST: postgres
      PGPORT: "5432"
      BACKUP_ROOT: /backups
      TZ: Asia/Tokyo
    volumes:
      - ./scripts/hourly-db-backup.sh:/scripts/hourly-db-backup.sh:ro
      - ./backups/handball:/backups/handball
      - ./backups/table-tennis:/backups/table-tennis
    command: ["sh", "/scripts/hourly-db-backup.sh"]
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toyota-kosen-club-activities
    restart: unless-stopped
    init: true
    depends_on:
      init-db:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=256}
      HANDBALL_NODE_OPTIONS: ${HANDBALL_NODE_OPTIONS:---max-old-space-size=384}
      TABLE_TENNIS_NODE_OPTIONS: ${TABLE_TENNIS_NODE_OPTIONS:---max-old-space-size=384}
      HANDBALL_PUBLIC_BASE_URL: ${HANDBALL_PUBLIC_BASE_URL:-http://localhost:3001}
      TABLE_TENNIS_PUBLIC_BASE_URL: ${TABLE_TENNIS_PUBLIC_BASE_URL:-http://localhost:3002}
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      HANDBALL_ADMIN_VIEW_KEY: ${HANDBALL_ADMIN_VIEW_KEY:?HANDBALL_ADMIN_VIEW_KEY is required}
      TABLE_TENNIS_ADMIN_VIEW_KEY: ${TABLE_TENNIS_ADMIN_VIEW_KEY:?TABLE_TENNIS_ADMIN_VIEW_KEY is required}
      HANDBALL_CLUB_PASSWORD: ${HANDBALL_CLUB_PASSWORD:?HANDBALL_CLUB_PASSWORD is required}
      TABLE_TENNIS_CLUB_PASSWORD: ${TABLE_TENNIS_CLUB_PASSWORD:?TABLE_TENNIS_CLUB_PASSWORD is required}
      HANDBALL_SUPER_ADMIN_NICKNAME: ${HANDBALL_SUPER_ADMIN_NICKNAME:-admin}
      TABLE_TENNIS_SUPER_ADMIN_NICKNAME: ${TABLE_TENNIS_SUPER_ADMIN_NICKNAME:-admin}
      HANDBALL_SUPER_ADMIN_LOGIN_PASSWORD: ${HANDBALL_SUPER_ADMIN_LOGIN_PASSWORD:?HANDBALL_SUPER_ADMIN_LOGIN_PASSWORD is required}
      TABLE_TENNIS_SUPER_ADMIN_LOGIN_PASSWORD: ${TABLE_TENNIS_SUPER_ADMIN_LOGIN_PASSWORD:?TABLE_TENNIS_SUPER_ADMIN_LOGIN_PASSWORD is required}
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
