services:
  postgres:
    image: postgres:16-alpine
    container_name: club-activities-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: club
      POSTGRES_PASSWORD: clubpass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      start_period: 90s
      interval: 5s
      timeout: 5s
      retries: 30
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=80"]

  db-backup:
    image: postgres:16-alpine
    container_name: club-activities-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: club
      POSTGRES_PASSWORD: clubpass
      PGHOST: postgres
      PGPORT: "5432"
      BACKUP_ROOT: /backups
      TZ: Asia/Tokyo
    volumes:
      - ./scripts/hourly-db-backup.sh:/scripts/hourly-db-backup.sh:ro
      - ./backups/handball:/backups/handball
      - ./backups/table-tennis:/backups/table-tennis
    command: ["sh", "/scripts/hourly-db-backup.sh"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toyota-kosen-club-activities
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      HANDBALL_ADMIN_VIEW_KEY: toyota-handball-admin
      TABLE_TENNIS_ADMIN_VIEW_KEY: toyota-table-tennis-admin

volumes:
  postgres_data:
